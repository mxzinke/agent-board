<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Minimal 2x2 grid -->
  <rect x="2" y="2" width="12" height="12" fill="#18181b" opacity="0.2"/>
  <rect x="18" y="2" width="12" height="12" fill="#18181b" opacity="0.2"/>
  <rect x="2" y="18" width="12" height="12" fill="#18181b" opacity="0.2"/>
