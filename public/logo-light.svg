<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Three kanban columns -->
  <!-- Column 1 - 2 cards -->
  <rect x="10" y="10" width="28" height="100" rx="0" fill="#e4e4e7" opacity="0.15" stroke="#e4e4e7" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="14" y="18" width="20" height="12" fill="#e4e4e7" opacity="0.4"/>
  <rect x="14" y="34" width="20" height="12" fill="#e4e4e7" opacity="0.4"/>

  <!-- Column 2 - 3 cards, one is the "active/agent" card -->
  <rect x="44" y="10" width="28" height="100" rx="0" fill="#e4e4e7" opacity="0.15" stroke="#e4e4e7" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="48" y="18" width="20" height="12" fill="#e4e4e7" opacity="0.4"/>
  <rect x="48" y="34" width="20" height="12" fill="#fafafa"/>
  <rect x="48" y="50" width="20" height="12" fill="#e4e4e7" opacity="0.4"/>

  <!-- Column 3 - 1 card -->
  <rect x="78" y="10" width="28" height="100" rx="0" fill="#e4e4e7" opacity="0.15" stroke="#e4e4e7" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="82" y="18" width="20" height="12" fill="#e4e4e7" opacity="0.4"/>
</svg>
