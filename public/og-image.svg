<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>

  <!-- Logo centered, scaled up -->
  <g transform="translate(510, 140)">
    <!-- 3x3 grid -->
    <rect x="0" y="0" width="44" height="44" fill="#18181b" opacity="0.15"/>
    <rect x="54" y="0" width="44" height="44" fill="#18181b" opacity="0.15"/>
    <rect x="108" y="0" width="44" height="44" fill="#18181b" opacity="0.15"/>
    <rect x="0" y="54" width="44" height="44" fill="#18181b" opacity="0.15"/>
    <rect x="54" y="54" width="44" height="44" fill="#18181b" opacity="0.4"/>
    <rect x="108" y="54" width="44" height="44" fill="#18181b" opacity="0.15"/>
    <rect x="0" y="108" width="44" height="44" fill="#18181b" opacity="0.15"/>
    <rect x="108" y="108" width="44" height="44" fill="#18181b" opacity="0.15"/>
    <!-- Agent cell -->
    <rect x="54" y="108" width="44" height="44" fill="#18181b"/>
    <!-- Cursor bars -->
    <rect x="66" y="116" width="4" height="24" fill="#fff"/>
    <rect x="76" y="122" width="4" height="18" fill="#fff" opacity="0.6"/>
    <rect x="86" y="119" width="4" height="21" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Text -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" fill="#18181b" letter-spacing="-1">agent-board</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#18181b" opacity="0.5">project management for humans + agents</text>
</svg>
